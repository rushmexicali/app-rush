// --- Desglose de un carro --------------------------------------------
// Cuanto duro cada etapa y quien lo seco. Todo viene ya sumado de la
// base (detalle_del_carro): un carro puede tener VARIAS filas de la
// misma etapa porque "Corregir" reabre la anterior, y sumarlo aqui
// seria repetir una regla que ya vive en SQL.
function duracion(seg) {
  if (seg === null || seg === undefined) return null;
  var m = Math.round(seg / 60);
  if (m < 60) return m + " min";
  return Math.floor(m / 60) + " h " + (m % 60) + " min";
}

// enVivo: en el desglose de un carro que todavia se trabaja, los tiempos
// se muestran como cronometro (mm:ss) para que se vea correr; ya entregado
// se muestran en minutos, mas facil de leer de un vistazo.
function renglonTiempo(que, seg, clase, enVivo) {
  var d = (seg === null || seg === undefined) ? null
        : (enVivo ? reloj(seg) : duracion(seg));
  return '<div class="tiempo' + (clase ? " " + clase : "") + '">' +
           '<span class="que">' + escapar(que) + '</span>' +
           (d ? '<span class="cuanto">' + escapar(d) + '</span>'
              : '<span class="vacio2">sin registro</span>') +
         '</div>';
}

// El cuerpo del desglose. Sirve para un carro entregado (estatico) y para
// uno que aun se trabaja (enVivo): ahi la etapa abierta se cuenta desde su
// inicio hasta ahora, y el total desde que pago.
function cuerpoDetalle(c, enVivo) {
  // Segundos de una etapa: los cerrados que da la base MAS, si es la etapa
  // abierta, lo que lleva corriendo. Asi el secado (o el prelavado de un
  // carro sin asignar) cuenta en vivo.
  function corre(etapa) {
    return enVivo && c.entregado_en == null && c.abierta_etapa === etapa && c.abierta_inicio;
  }
  function seg(etapa, cerrado) {
    var s = (cerrado == null ? 0 : cerrado);
    if (corre(etapa)) s += Math.floor((Date.now() - new Date(c.abierta_inicio).getTime()) / 1000);
    return s;
  }

  var servicio = [c.producto, (c.variante && c.variante !== c.producto) ? c.variante : ""]
                   .filter(Boolean).join("  ·  ");

  var h = "";
  h += "<h2>" + describir(c) + "</h2>";
  if (c.placa) h += '<div class="placa">' + escapar(c.placa) + "</div>";
  h += '<div class="sub">' + escapar(servicio) +
       (c.linea ? "  ·  Línea " + escapar(c.linea) : "") + "</div>";

  // Las mismas banderitas de la cola, para reconocer el carro.
  if (c.es_express) h += '<span class="express">&#9873; EXPRESS</span> ';
  if (c.aviso) {
    h += '<span class="aviso-servicio ' + claseDeAviso(c.aviso) + '">&#9888; ' +
         escapar(c.aviso) + "</span> ";
  }
  if (c.a_mano) h += '<span class="aviso-servicio mano">&#9888; LAVADO A MANO</span>';

  // Prelavado. Corre en vivo si el carro todavia no se asigna (raro que se
  // abra el detalle ahi, pero queda honesto).
  h += renglonTiempo("Prelavado" + (corre("prelavado") ? " · en curso" : ""),
                     enVivo ? seg("prelavado", c.prelavado_seg) : c.prelavado_seg,
                     corre("prelavado") ? "corriendo" : "", enVivo);

  // El tunel siempre esta cerrado (dura lo que dura la maquina). No se
  // muestra en un lavado a mano: no entro.
  if (!c.a_mano && c.tunel_seg) {
    h += renglonTiempo("Túnel", c.tunel_seg, "", enVivo);
  }

  // Secado. Es el que corre mientras el carro se trabaja. Solo se muestra
  // si ya empezo (o ya termino): en prelavado no existe todavia.
  if (c.secando_seg != null || corre("secando") || c.entregado_en != null) {
    h += renglonTiempo("Secado" + (corre("secando") ? " · en curso" : ""),
                       enVivo ? seg("secando", c.secando_seg) : c.secando_seg,
                       corre("secando") ? "corriendo" : "", enVivo);
  }

  // Total de pago a entrega. En vivo cuenta desde que pago hasta ahora.
  var total = c.entregado_en != null ? c.total_seg
            : (enVivo ? Math.floor((Date.now() - new Date(c.creado_en).getTime()) / 1000) : null);
  h += renglonTiempo("Total con nosotros", total, "total", enVivo);

  // Los avisos honestos: un tiempo que no es real hay que decirlo, porque
  // en esta pantalla se lee como si fuera medido.
  if (c.cerrado_automaticamente) {
    h += '<div class="ausente">&#9888; Nadie lo entregó: se cerró solo al final del día.' +
         "<br>Su tiempo no es real y no cuenta en los promedios.</div>";
  }
  if (c.tiempo_imposible) {
    h += '<div class="ausente">&#9888; Se entregó más rápido de lo posible.' +
         "<br>Casi seguro fue un error o una prueba; no cuenta en el reporte.</div>";
  }

  // Ya entregado dice "Lo secaron"; todavia trabajandose, "Secando ahora".
  var titulo = c.entregado_en != null ? "Lo secaron" : "Secando ahora";
  h += '<div class="quienes"><div class="titulo2">' + titulo + "</div>";
  if (c.secadores && c.secadores.length) {
    for (var i = 0; i < c.secadores.length; i++) {
      h += '<div class="nombre">' + escapar(c.secadores[i]) + "</div>";
    }
  } else {
    h += '<div class="vacio2">' +
         (c.entregado_en == null ? "Aún sin asignar" : "Sin secador registrado") + "</div>";
  }
  h += "</div>";
  return h;
}

// El carro que se esta viendo y el timer del cronometro en vivo.
var detalleCarro = null;
var detalleTimer = null;

// enVivo lo manda el boton de info de la cola; desde Finalizados no se
// manda (undefined), y el carro ya entregado se ve estatico.
function abrirDetalle(id, enVivo) {
  clearInterval(detalleTimer); detalleTimer = null;
  detalleCarro = null;

  document.getElementById("detalle").style.display = "block";
  document.getElementById("detalle-cuerpo").innerHTML = '<div class="sub">Cargando…</div>';
  document.getElementById("detalle").scrollTop = 0;
  window.scrollTo(0, 0);
  registrarPantalla(cerrarDetalle);   // el back del telefono la cierra

  pedir("/carro?id=" + encodeURIComponent(id))
    .then(function (r) { return r.json(); })
    .then(function (c) {
      if (!c || c.error) {
        document.getElementById("detalle-cuerpo").innerHTML =
          '<div class="sub">No se pudo cargar.</div>';
        return;
      }
      detalleCarro = c;
      // Solo cuenta en vivo si lo pidieron Y el carro sigue abierto.
      detalleCarro._enVivo = !!enVivo && c.entregado_en == null;
      pintarDetalle();
      // El cronometro se refresca cada segundo, igual que el de la cola.
      if (detalleCarro._enVivo) detalleTimer = setInterval(pintarDetalle, 1000);
    })
    .catch(function () {
      document.getElementById("detalle-cuerpo").innerHTML =
        '<div class="sub">Sin conexión.</div>';
    });
}

function pintarDetalle() {
  if (!detalleCarro) return;
  document.getElementById("detalle-cuerpo").innerHTML =
    cuerpoDetalle(detalleCarro, detalleCarro._enVivo);
}

function cerrarDetalle() {
  // Se apaga el cronometro al cerrar: si no, seguiria corriendo en el
  // fondo gastando bateria sin que nadie lo vea.
  clearInterval(detalleTimer); detalleTimer = null;
  detalleCarro = null;
  document.getElementById("detalle").style.display = "none";
}

document.getElementById("detalle-cerrar").addEventListener("click", function () { cerrarPantalla(); });

// Cambiar de dia recarga la lista. El valor "" es hoy. yaAbierta: la
// pantalla ya esta abierta, no se registra otra vez.
document.getElementById("entregados-dia").addEventListener("change", function () {
  diaEntregados = this.value;
  abrirEntregados(true);
});

document.getElementById("entregados-lista").addEventListener("click", function (ev) {
  // Tocar los datos del carro abre su desglose. Va PRIMERO para que un
  // toque dentro de .datos no se confunda con los botones de al lado.
  var det = ev.target.closest("[data-detalle]");
  if (det) { abrirDetalle(Number(det.dataset.detalle)); return; }

  // Corregir no pasa por "ocupado": no cambia la etapa del carro, igual
  // que la camara en la cola.
  var corr = ev.target.closest("button[data-corregir-ent]");
  if (corr) {
    var id = Number(corr.dataset.corregirEnt);
    var carro = ENTREGADOS.filter(function (x) { return x.id === id; })[0];
    if (!carro) return;
    volverAEntregados = true;
    document.getElementById("entregados").style.display = "none";
    abrirPantalla(carro, "corregir");
    return;
  }

  var b = ev.target.closest("button[data-restaurar]");
  if (!b || ocupado) return;
  ocupado = true;
  b.disabled = true;
  if (navigator.vibrate) navigator.vibrate(30);

  // Misma ruta que el boton "Regresar": desde entregado, regresar_etapa
  // lo devuelve a secando con su linea y sus secadores.
  pedir("/corregir", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ carro: Number(b.dataset.restaurar) })
  })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.ok === false) { alert(d.error || "No se pudo restaurar"); return; }
      abrirEntregados(true);   // refresca; ya esta abierta, no re-registra
    })
    .catch(function () { alert("Sin conexión. Intenta otra vez."); })
    .then(function () { ocupado = false; consultar(); });
});

// La foto se achica, se sube, y de ahi sale la placa. Es una sola funcion
// para que el camino no se pueda desincronizar.
function subirFoto(archivo, id) {
  if (!archivo || !id) return;

  var boton = document.querySelector('[data-foto="' + id + '"]');
  if (boton) boton.classList.add("subiendo");

  achicar(archivo)
    .then(function (imagen) {
      return pedir("/foto", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ carro: id, imagen: imagen })
      });
    })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.ok === false) alert(d.error || "No se pudo guardar la foto");
      if (navigator.vibrate) navigator.vibrate(30);
      consultar();
    })
    .catch(function () {
      // Si falla, se avisa pero no pasa nada mas: el carro sigue su
      // camino sin foto.
      alert("No se pudo subir la foto. El carro sigue igual.");
      if (boton) boton.classList.remove("subiendo");
    });
}

document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("camara").addEventListener("change", function (ev) {
    var archivo = ev.target.files && ev.target.files[0];
    ev.target.value = "";                  // permite repetir la misma foto
    subirFoto(archivo, carroDeLaFoto);
  });
});

// --- Los botones -----------------------------------------------------
// Se escucha en el contenedor y no en cada boton, porque la lista se
// vuelve a dibujar cada segundo y los botones se recrean.
var ocupado = false;

document.getElementById("lista").addEventListener("click", function (ev) {
  // La camara va aparte: no pasa por el bloqueo de "ocupado" porque no
  // cambia la etapa del carro y no debe estorbarse con los demas toques.
  var camara = ev.target.closest("button[data-foto]");
  if (camara) {
    // Un boton disabled no dispara click, pero por si acaso: sin carril y
    // secador la foto no se abre.
    if (camara.disabled) return;
    carroDeLaFoto = Number(camara.dataset.foto);
    document.getElementById("camara").click();
    return;
  }

  // El boton de info abre el desglose de tiempos, en vivo. No pasa por
  // "ocupado": solo abre una pantalla, no cambia la etapa del carro.
  var info = ev.target.closest("button[data-info]");
  if (info) {
    abrirDetalle(Number(info.dataset.info), true);
    return;
  }

  function buscarCarro(id) {
    for (var j = 0; j < carros.length; j++) {
      if (carros[j].id === Number(id)) return carros[j];
    }
    return null;
  }

  // Corregir abre la pantalla de captura. No pasa por "ocupado": no
  // cambia la etapa del carro, solo abre una pantalla.
  var editar = ev.target.closest("button[data-editar]");
  if (editar) {
    var paraEditar = buscarCarro(editar.dataset.editar);
    if (paraEditar) abrirPantalla(paraEditar, "corregir");
    return;
  }

  var boton = ev.target.closest("button[data-accion]");
  if (!boton || ocupado) return;

  // El boton principal nunca manda solo: siempre abre una pantalla.
  //   antes de secar -> asignar linea y secadores
  //   secando        -> confirmar si se entrega o se rechaza
  if (boton.dataset.accion === "avanzar") {
    var buscado = buscarCarro(boton.dataset.carro);
    if (buscado && (buscado.estado === "prelavado" ||
                    buscado.estado === "tunel" ||
                    buscado.estado === "por_asignar")) {
      abrirAsignacion(buscado);
      return;
    }
    if (buscado && buscado.estado === "secando") {
      abrirEntrega(buscado);
      return;
    }
  }

  // Bloqueo mientras viaja la peticion: el supervisor va a picar dos
  // veces si no ve respuesta inmediata, y eso saltaria una etapa.
  ocupado = true;
  boton.disabled = true;
  if (navigator.vibrate) navigator.vibrate(30);

  pedir("/" + boton.dataset.accion, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ carro: Number(boton.dataset.carro) })
  })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.ok === false) alert(d.error || "No se pudo");
    })
    .catch(function () { alert("Sin conexión. Intenta otra vez."); })
    .then(function () {
      ocupado = false;
      consultar();  // se repinta con lo que diga la base, no con lo que supongamos
    });
});

// El reloj corre solo cada segundo; los datos se piden cada 3. Asi el
// cronometro se ve fluido sin castigar el wifi del taller.
// El navegador no deja sonar ni encender la pantalla hasta que la
// persona toca algo. Se aprovecha el primer toque, sea cual sea.
function primerToque() {
  despertarAudio();
  mantenerPantallaEncendida();
  document.removeEventListener("pointerdown", primerToque);
}
document.addEventListener("pointerdown", primerToque);

// El service worker permite instalarla en la pantalla de inicio y que
// abra aunque el wifi este caido.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}

cargarCodigo();
// El reloj corre cada segundo pero SOLO actualiza numeros, no reconstruye
// (por eso los guiones no se cortan). El HTML se rehace solo cuando
// consultar() trae datos distintos, y pintar() ademas se salta el rebuild
// si la firma no cambio.
setInterval(actualizarRelojes, 1000);
setInterval(consultar, 3000);
consultar();
