<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icono-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RUSH — Cola</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#0d1117; color:#fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 12px 12px 40px;
    font-size: 18px;
  }
  header {
    display:flex; justify-content:space-between; align-items:center;
    padding: 6px 4px 14px;
  }
  /* El logo es la palabra completa. Se fija la ALTURA y el ancho sale
     solo, para que no se deforme si algun dia cambia el archivo. */
  #logo { height: 30px; width: auto; display: block; }
  /* Respaldo si la imagen no carga: se ve la palabra, no un hueco. */
  h1 { font-size: 26px; letter-spacing:1px; margin:0; }
  #cuantos { font-size: 20px; color:#8b949e; font-weight:700; }

  .carro {
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    border-left: 14px solid var(--color);
    background: #161b22;
    display: grid;
    /* Columnas explicitas: el texto a la izquierda, el reloj a la
       derecha. Sin esto el reloj se colaba a la primera columna. */
    grid-template-columns: minmax(0, 1fr) auto;
    column-gap: 12px;
  }
  .carro.demorado { background:#3d1418; border-color:#ff4d4f; }

  .unidad {
    grid-column: 1; grid-row: 1;
    font-size: 27px; font-weight: 800; line-height:1.15;
  }
  .unidad .falta { color:#6e7681; font-weight:600; font-style:italic; font-size:21px; }

  /* La placa va en su PROPIO renglon, entre el tipo de carro y el
     servicio. Mezclada en la misma linea que "CAMIONETA NEGRA HONDA" se
     perdia. Mas chica que el tipo, pero en recuadro blanco para que salte
     a la vista sin tener que leerla.

     Si el carro no tiene placa este renglon no existe y la fila queda en
     cero: no hay row-gap, asi que no deja hueco. */
  .placa {
    grid-column: 1; grid-row: 2;
    justify-self: start;
    margin-top: 5px;
    font-family: ui-monospace, "Consolas", monospace;
    font-size: 20px; font-weight: 700; letter-spacing: 1.5px;
    background:#f0f6fc; color:#0d1117;
    border-radius: 4px; padding: 2px 9px;
  }

  .servicio {
    grid-column: 1; grid-row: 3;
    font-size: 17px; color:#adbac7; margin-top:3px; line-height:1.25;
  }

  /* Los secadores asignados, en la tarjeta y del MISMO tamaño que el
     renglon del servicio (17px): el dueño los quiere visibles sin abrir
     el carro. Va dentro del bloque del servicio a proposito, para no
     reacomodar la rejilla ni empujar el estado, la foto y los botones a
     otra fila. Mas claro que el servicio para que los nombres salten. */
  .secadores-tarjeta {
    font-size: 17px; font-weight: 700; color:#e6edf3;
    margin-top: 4px; line-height: 1.3;
  }

  .reloj {
    grid-column: 2; grid-row: 1 / span 3;
    align-self: center;
    font-size: 38px; font-weight: 800;
    font-variant-numeric: tabular-nums;
    text-align: right;
    line-height: 1;
    white-space: nowrap;
  }
  .demorado .reloj { color:#ff7875; }

  /* Ocupa SOLO la primera columna. Antes se extendia a todo el ancho
     (1 / -1) en la misma fila del boton de la foto, y aunque no se veia,
     se montaba encima y se robaba los toques. */
  .estado {
    grid-column: 1; grid-row: 4;
    margin-top: 12px;
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .etiqueta {
    background: var(--color); color:#08090b;
    font-weight: 800; font-size: 17px;
    padding: 5px 14px; border-radius: 999px;
    text-transform: uppercase; letter-spacing:.5px;
  }
  .demorado .etiqueta { background:#ff4d4f; color:#fff; }

  /* El express tiene que saltar a la vista sin leerlo. Como el amarillo
     ya lo usa el estado "en tunel", no basta el color: la tarjeta
     completa lleva marco amarillo y la etiqueta lleva banderita. */
  .carro.expreso { box-shadow: inset 0 0 0 3px #ffd400; }
  .express {
    background:#ffd400; color:#000;
    font-weight:900; font-size:17px;
    padding:5px 14px; border-radius:999px;
    letter-spacing:.5px;
  }
  /* Servicio que NO es un lavado normal: encerado, super brillo, lavado
     a mano. Existe porque los secadores no leen el ticket y lo tratan
     como lavado, y eso genera quejas de clientes.

     MORADO y no amarillo: el amarillo ya es del express y significa "va
     a la linea 1". Esto significa otra cosa — "el trabajo es distinto" —
     y confundirlos seria peor que no marcarlo. El morado estaba libre
     (era del estado "por asignar", que ya no existe). */
  /* TRES colores, uno por familia de servicio. Se escogieron evitando
     los que ya significan algo:
       rojo    = demora        naranja quedaria muy cerca
       amarillo= express/tunel
       azul    = prelavado     verde = secando
       blanco  = el recuadro de la placa
     Quedaron libres el morado, el cian y el naranja. El naranja se le da
     al DETALLADO, que es el mas raro: si algun dia se confunde con el
     rojo de demora, es el que menos veces va a pasar. */
  .aviso-servicio {
    color:#000; font-weight:900; font-size:17px;
    padding:5px 14px; border-radius:999px; letter-spacing:.5px;
  }
  .aviso-servicio.encerado  { background:#a371f7; }  /* encerado y super brillo */
  .aviso-servicio.mano      { background:#22d3ee; }  /* lavado a mano */
  .aviso-servicio.detallado { background:#ff8c00; }  /* detallado */

  /* El marco. Un carro puede llevar VARIAS banderitas (un Super Brillo
     lavado a mano lleva morada y cian), pero marco solo hay uno: gana el
     del servicio, porque el "a mano" ya se ve en su propia etiqueta y el
     servicio es el que causa las quejas de cliente. */
  .carro.marco-encerado  { box-shadow: inset 0 0 0 3px #a371f7; }
  .carro.marco-detallado { box-shadow: inset 0 0 0 3px #ff8c00; }
  .carro.marco-mano      { box-shadow: inset 0 0 0 3px #22d3ee; }

  .linea { font-size:18px; color:#8b949e; font-weight:700; }

  /* Aviso de secador que se poncho con el carro asignado. Va en la
     tarjeta, no en una pantalla aparte: el supervisor tiene que verlo
     sin ir a buscarlo. */
  .ausente {
    grid-column: 1 / -1; grid-row: 5;
    margin-top: 10px;
    background:#3d1418; color:#ffb3b3;
    border-left: 5px solid #ff4d4f;
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 17px; font-weight: 700;
    line-height: 1.25;
  }

  /* Los botones son lo mas importante de la pantalla: gigantes, uno por
     accion, y el texto dice QUE HACE, no algo generico. */
  /* Dos renglones: el principal solo, gigante, y abajo los dos
     secundarios repartidos a la mitad. Los tres en una sola fila dejaban
     el principal en ~130px, muy angosto para "Asignar unidad". */
  .acciones {
    grid-column: 1 / -1; grid-row: 6;
    margin-top: 14px;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .avanzar {
    flex: 1 0 100%;
    min-height: 76px;
    font-size: 23px; font-weight: 800;
    color:#08090b; background: var(--color);
    border: none; border-radius: 14px;
    padding: 10px 12px;
    line-height:1.15;
    cursor: pointer;
  }
  .demorado .avanzar { background:#ff4d4f; color:#fff; }
  .avanzar:active { filter: brightness(.8); }
  .avanzar[disabled] { opacity:.45; }

  /* Guiones rojos marchando por la orilla del boton de Asignar (- - - -),
     dando la vuelta. El supervisor le picaba al icono redondo de
     prelavado por ser del mismo azul; los guiones en movimiento marcan
     cual es el boton que SI se toca, sin el ruido de un glow. Solo en
     Asignar; en "Entregado" (verde) no hace falta.

     Son cuatro tiras de guiones, una por lado, que marchan en circulo
     (arriba -> derecha -> abajo -> izquierda). Se anima
     'background-position', que se queda DENTRO de la caja: no hay nada
     que rotar, asi que nunca se sale del boton (que es lo que pasaba al
     rotar un elemento tan ancho). */
  .avanzar.girando { position: relative; }
  .avanzar.girando::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 14px;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(90deg, #ff2626 0 22px, transparent 22px 33px),
      repeating-linear-gradient(90deg, #ff2626 0 22px, transparent 22px 33px),
      repeating-linear-gradient(0deg,  #ff2626 0 22px, transparent 22px 33px),
      repeating-linear-gradient(0deg,  #ff2626 0 22px, transparent 22px 33px);
    background-size: 33px 3px, 33px 3px, 3px 33px, 3px 33px;
    background-position: 0 0, 0 100%, 0 0, 100% 0;
    background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
    animation: girar-lineas 0.8s linear infinite;
  }
  @keyframes girar-lineas {
    to { background-position: 33px 0, -33px 100%, 0 -33px, 100% 33px; }
  }

  /* Corregir siempre visible, pero claramente secundario para que nadie
     lo confunda con el boton de avanzar. */
  .corregir {
    flex: 1; min-height: 64px;
    font-size: 18px; font-weight: 700;
    color:#adbac7; background: transparent;
    border: 2px solid #30363d; border-radius: 14px;
    cursor: pointer;
  }
  .corregir:active { background:#30363d; }
  .corregir[disabled] { opacity:.3; }

  /* La foto es OPCIONAL y no debe estorbar. Botones chicos, al lado del
     reloj, para que en dia pesado se ignoren sin siquiera notarlo. */
  .fotos {
    grid-column: 2; grid-row: 4;
    justify-self: end; align-self: center;
    margin-top: 12px;
    display: flex; gap: 8px; align-items: center;
  }
  .foto {
    /* Mas grande que el icono para que el area de toque sea generosa:
       el supervisor lo va a picar con el pulgar, a veces con guantes
       mojados. */
    height: 58px; width: 70px; font-size: 24px;
    background: transparent;
    border: 2px solid #30363d; border-radius: 12px;
    color: #8b949e;
    cursor: pointer; padding: 0;
    overflow: hidden;
  }
  .foto:active { background:#30363d; }
  .foto img { width:100%; height:100%; object-fit:cover; display:block; }
  .foto.subiendo { opacity:.4; }
  /* La foto se habilita solo cuando el carro ya tiene carril y secador.
     Antes de eso el boton SE VE apagado (no desaparece): un boton que
     aparece solo confunde al supervisor de la tercera edad. */
  .foto[disabled] { opacity:.28; cursor:default; }

  /* Boton de info: abre el desglose de tiempos del carro. Va donde antes
     estaba la galeria (a la izquierda de la camara), mas chico y apagado
     para que el pulgar caiga en la camara por default. Es un boton aparte
     y no un toque a la tarjeta a proposito: evita que el desglose se abra
     por accidente al querer picar otra cosa. */
  .info {
    width: 48px; height: 58px;
    background: transparent;
    border: 2px solid #30363d; border-radius: 12px;
    color: #8b949e; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .info:active { background:#30363d; }
  .info svg { width: 27px; height: 27px; display: block; }

  #camara { display: none; }

  /* Pantalla de acceso. Se teclea una sola vez por telefono. */
  #acceso {
    display:none;
    position:fixed; inset:0; z-index:50;
    background:#0d1117;
    padding:28px 22px;
    flex-direction:column; justify-content:center; gap:18px;
  }
  #logo-acceso { height:44px; width:auto; align-self:flex-start; margin-bottom:6px; }
  #acceso h2 { font-size:28px; }
  #acceso p { color:#8b949e; font-size:18px; line-height:1.4; }
  #campo {
    width:100%; min-height:70px;
    font-size:26px; font-weight:700; text-align:center;
    letter-spacing:2px; text-transform:uppercase;
    background:#161b22; color:#fff;
    border:2px solid #30363d; border-radius:14px;
    padding:12px;
  }
  #entrar {
    width:100%; min-height:76px;
    font-size:24px; font-weight:800;
    background:#2f81f7; color:#fff;
    border:none; border-radius:14px; cursor:pointer;
  }
  #malcodigo { color:#ff7875; font-size:18px; font-weight:700; display:none; }

  /* ---- Pantalla de asignar linea, marca y secadores ---- */
  #asignar {
    display:none;
    position:fixed; inset:0; z-index:40;
    background:#0d1117;
    overflow-y:auto;
    padding:16px 14px 120px;
  }
  #asignar .quien {
    font-size:28px; font-weight:800; line-height:1.15; margin-bottom:2px;
  }
  #asignar .cual { font-size:18px; color:#8b949e; margin-bottom:18px; }

  .seccion { font-size:20px; font-weight:800; margin:20px 0 10px; color:#adbac7; }
  .seccion .pendiente { color:#e3b341; font-weight:700; }
  .seccion .listo { color:#3fb950; }

  /* Campo para escribir un color que no esta en los comunes. Se ve
     SIEMPRE en mayusculas: el text-transform lo pinta, pero el valor real
     lo sube el 'input' en vivo (solo con CSS se mandarian minusculas y el
     formato no quedaria uniforme con lo que llega de la nota de caja). */
  .color-otro-input {
    width:100%; min-height:64px; margin-top:9px;
    font-size:22px; font-weight:800; text-align:center;
    letter-spacing:1px; text-transform:uppercase;
    background:#161b22; color:#fff;
    border:2px solid #2f81f7; border-radius:13px; padding:10px;
  }
  .color-otro-input::placeholder { color:#6e7681; font-weight:700; letter-spacing:.5px; }

  .rejilla { display:grid; gap:9px; }
  .rejilla.marcas    { grid-template-columns: repeat(2, 1fr); }
  .rejilla.tipos     { grid-template-columns: repeat(2, 1fr); }
  .rejilla.colores   { grid-template-columns: repeat(3, 1fr); }
  .rejilla.motivos   { grid-template-columns: repeat(2, 1fr); }
  .rejilla.entrega2  { grid-template-columns: repeat(2, 1fr); gap:12px; }

  /* ---- Confirmar entrega / lista de entregados ---- */
  /* Mismo patron de pantalla completa que #asignar: el supervisor ya lo
     conoce. Debajo de #acceso (50) y encima de #asignar (40). */
  #entrega, #entregados {
    display:none;
    position:fixed; inset:0; z-index:45;
    background:#0d1117;
    overflow-y:auto;
    padding:18px 14px 40px;
  }
  /* Sin relleno arriba: se lo queda la cabecera fija, para que al pegarse
     no deje una franja de fondo encima. */
  #entregados { padding-top:0; }

  #entregados-cabecera {
    position:sticky; top:0; z-index:2;
    background:#0d1117;
    padding:14px 0 12px;
    border-bottom:1px solid #21262d;
    margin-bottom:14px;
  }
  #entregados-cerrar {
    width:100%; min-height:64px; margin-bottom:12px;
    font-size:19px; font-weight:800;
    background:#161b22; color:#e6edf3;
    border:2px solid #30363d; border-radius:14px; cursor:pointer;
  }
  #entregados-cerrar:active { background:#30363d; }

  /* El boton de volver y el selector de dia, en la misma fila. */
  .fila-cabecera { display:flex; gap:10px; align-items:center; }
  .fila-cabecera #entregados-cerrar { flex:1 1 auto; }
  #entregados-dia {
    flex:0 0 auto; min-height:52px; max-width:46%;
    background:#21262d; color:#e6edf3; border:1px solid #30363d;
    border-radius:12px; padding:0 12px; font-size:17px; font-weight:700;
  }

  /* Desglose de un carro. Encima de #entregados (45) porque se abre
     desde ahi; si no, quedaria por debajo y no se veria — el mismo
     problema que ya se resolvio con la pantalla de corregir. */
  #detalle {
    display:none; position:fixed; inset:0; z-index:47;
    background:#0d1117; overflow-y:auto; padding:0 14px 40px;
  }
  #detalle-cabecera { position:sticky; top:0; background:#0d1117; padding:14px 0 10px; }
  #detalle-cerrar {
    width:100%; min-height:52px; background:#21262d; color:#e6edf3;
    border:1px solid #30363d; border-radius:12px; font-size:18px; font-weight:700;
  }
  #detalle-cerrar:active { background:#30363d; }

  #detalle h2 { font-size:28px; font-weight:800; margin:6px 0 2px; line-height:1.15; }
  #detalle .sub { font-size:17px; color:#8b949e; margin-bottom:16px; }

  /* Cada tiempo en su renglon, con el numero grande a la derecha. Se
     lee de un vistazo sin tener que buscar. */
  .tiempo {
    display:flex; justify-content:space-between; align-items:baseline;
    gap:12px; padding:14px 0; border-bottom:1px solid #21262d;
  }
  .tiempo .que  { font-size:19px; color:#adbac7; font-weight:700; }
  .tiempo .cuanto {
    font-size:30px; font-weight:800; font-variant-numeric:tabular-nums;
  }
  .tiempo.total .que, .tiempo.total .cuanto { color:#ffd400; }
  /* Etapa que esta corriendo ahora mismo: en verde (el color de secando),
     para que se lea de un vistazo que ese numero esta vivo. */
  .tiempo.corriendo .que, .tiempo.corriendo .cuanto { color:#3fb950; }
  .tiempo .vacio2 { font-size:19px; color:#6e7681; font-style:italic; font-weight:600; }

  #detalle .quienes { margin-top:20px; }
  #detalle .quienes .titulo2 { font-size:19px; color:#adbac7; font-weight:700; margin-bottom:8px; }
  #detalle .quienes .nombre { font-size:24px; font-weight:800; line-height:1.35; }
  #entrega .quien, #entregados .quien { font-size:28px; font-weight:800; line-height:1.15; }
  #entrega .cual,  #entregados .cual  { font-size:18px; color:#8b949e; margin-top:4px; }
  #entrega .rejilla.entrega2 { margin-top:26px; }

  /* Entregar en verde, rechazar en rojo: el color dice cual es cual sin
     tener que leer, como el resto de la app. */
  .opcion.bueno { background:#3fb950; border-color:#3fb950; color:#08090b; min-height:96px; font-size:24px; }
  .opcion.malo  { background:transparent; border-color:#ff4d4f; color:#ff7875; min-height:96px; font-size:24px; }
  .opcion.volver { width:100%; margin-top:26px; min-height:66px; font-size:19px; }

  /* Tarjeta de un entregado: mucho mas sencilla que la de la cola. Aqui
     no hay cronometro ni etapas, solo reconocerlo y poder restaurarlo. */
  .entregado {
    background:#161b22; border:1px solid #30363d; border-radius:14px;
    padding:12px 14px; margin-bottom:10px;
    display:flex; align-items:center; gap:12px;
  }
  .entregado .datos { flex:1; min-width:0; }
  .entregado .titulo { font-size:19px; font-weight:800; line-height:1.2; }
  .entregado .pie { font-size:15px; color:#8b949e; margin-top:3px; }
  .entregado .placa2 {
    display:inline-block; font-family: ui-monospace, "Consolas", monospace;
    font-size:15px; font-weight:700; letter-spacing:1px;
    background:#f0f6fc; color:#0d1117; border-radius:4px; padding:1px 6px; margin-right:6px;
  }
  /* Amarillo: es el MISMO #e3b341 que ya usa el tunel en la cola, no un
     amarillo nuevo. La app no debe acumular tonos distintos del mismo
     color o dejan de significar algo. */
  .restaurar {
    flex:0 0 auto; min-height:60px; padding:0 16px;
    font-size:17px; font-weight:700;
    background:transparent; color:#e3b341;
    border:2px solid #e3b341; border-radius:12px; cursor:pointer;
  }
  .restaurar:active { background:rgba(227,179,65,.18); }

  /* Corregir va al lado de Restaurar, apilados. Mas apagado a proposito:
     los dos son acciones raras, pero restaurar es la que el supervisor
     viene buscando cuando entra aqui. */
  .corregir-ent {
    background:#21262d; color:#adbac7; border:1px solid #30363d;
    border-radius:12px; padding:12px 16px; font-size:17px; font-weight:700;
    flex-shrink:0; margin-top:8px;
  }
  .corregir-ent:active { background:#30363d; }

  /* Los dos botones de la tarjeta, uno debajo del otro. */
  .entregado .acciones { display:flex; flex-direction:column; flex-shrink:0; }

  /* Boton para entrar a los entregados. Al final de la cola, no arriba:
     no debe competir con los carros que si necesitan atencion. */
  #ver-entregados {
    width:100%; margin-top:6px; min-height:64px;
    font-size:19px; font-weight:700;
    background:transparent; color:#adbac7;
    border:2px solid #30363d; border-radius:14px; cursor:pointer;
  }
  #ver-entregados:active { background:#161b22; }
  .rejilla.lineas    { grid-template-columns: repeat(3, 1fr); }
  .rejilla.secadores { grid-template-columns: repeat(2, 1fr); }

  /* Secador: circulo de color con iniciales + nombre. Sin fotos en
     Jibble, el color es lo que hace el trabajo de la cara: es unico por
     persona y no cambia nunca. */
  .persona {
    display:flex; align-items:center; gap:11px;
    text-align:left; padding:9px 11px; min-height:72px;
  }
  .circulo {
    width:46px; height:46px; flex:0 0 46px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:900; color:#08090b;
    letter-spacing:.5px;
  }
  .persona .quien2 { font-size:18px; font-weight:700; line-height:1.15; }
  .persona .nota2 { font-size:14px; color:#e3b341; font-weight:700; margin-top:2px; }

  /* En descanso: atenuado pero SI se puede tocar. El CLAUDE.md pide no
     quitarlos, porque pueden regresar en un minuto. */
  .opcion.descansando { opacity:.5; border-style:dashed; }
  .opcion.descansando.elegida { opacity:1; }

  #sin-secadores {
    grid-column: 1 / -1;
    color:#ff7875; font-size:17px; font-weight:700;
    padding:14px; border:2px dashed #3d1418; border-radius:12px;
    text-align:center;
  }

  .opcion {
    min-height: 68px;
    font-size: 20px; font-weight: 800;
    background:#161b22; color:#fff;
    border:2px solid #30363d; border-radius:13px;
    padding:8px 6px; cursor:pointer;
    line-height:1.1;
  }
  .opcion:active { background:#21262d; }
  .opcion.elegida { background:#2f81f7; border-color:#2f81f7; color:#fff; }
  .opcion[disabled] { opacity:.25; }

  .lineas .opcion { min-height:78px; font-size:26px; }
  .lineas .opcion.solo-express { border-color:#ffd400; color:#ffd400; }

  /* Barra fija abajo: el boton de confirmar siempre al alcance del
     pulgar, sin tener que buscar el final de la pantalla. */
  #barra {
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:#0d1117; border-top:1px solid #21262d;
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    display:flex; gap:10px;
  }
  #confirmar {
    flex:1; min-height:78px;
    font-size:23px; font-weight:800;
    background:#3fb950; color:#08090b;
    border:none; border-radius:14px; cursor:pointer;
  }
  #confirmar[disabled] { background:#21262d; color:#6e7681; }
  #cancelar {
    width:110px; min-height:78px;
    font-size:19px; font-weight:700;
    background:transparent; color:#adbac7;
    border:2px solid #30363d; border-radius:14px; cursor:pointer;
  }

  #vacio { text-align:center; color:#6e7681; padding:70px 20px; font-size:22px; }
  #error {
    display:none; background:#3d1418; color:#ffb3b3;
    padding:12px; border-radius:12px; margin-bottom:12px; font-size:17px;
  }
</style>
</head>
<body>

<header>
  <!-- Si la imagen no carga (wifi caido en la primera visita, antes de que
       el service worker la guarde), onerror deja el texto en su lugar. Un
       hueco en el encabezado se ve como app rota. -->
  <img id="logo" src="RUSH-Logo.png" alt="RUSH"
       onerror="this.outerHTML='&lt;h1&gt;RUSH&lt;/h1&gt;'">
  <div id="cuantos"></div>
</header>

<div id="error"></div>
<div id="lista"></div>
<div id="vacio" style="display:none">No hay carros en proceso</div>

<!-- Al FINAL, no arriba: los carros que necesitan atencion van primero.
     Es un boton y no una pestaña a proposito — el CLAUDE.md pide toques
     directos, sin elementos de navegacion permanentes. -->
<button id="ver-entregados">Finalizados</button>

<div id="asignar">
  <div class="quien" id="asig-quien"></div>
  <div class="cual" id="asig-cual"></div>

  <div class="seccion">Tipo</div>
  <div class="rejilla tipos" id="asig-tipos"></div>

  <div class="seccion">Color</div>
  <div class="rejilla colores" id="asig-colores"></div>
  <!-- El campo vive FUERA de la rejilla (que se redibuja) para que no se
       borre mientras el supervisor teclea. Se muestra/oculta, no se
       recrea. -->
  <div id="asig-color-otro" style="display:none">
    <input id="asig-color-input" class="color-otro-input" type="text"
           inputmode="text" autocomplete="off" autocapitalize="characters"
           placeholder="ESCRIBE EL COLOR">
  </div>

  <div class="seccion">Marca <span id="asig-marca-estado" class="pendiente">— falta</span></div>
  <div class="rejilla marcas" id="asig-marcas"></div>

  <div id="asig-solo-asignar">
    <div class="seccion">Línea <span id="asig-linea-estado" class="pendiente">— falta</span></div>
    <div class="rejilla lineas" id="asig-lineas"></div>

    <div class="seccion">Secadores <span id="asig-sec-estado" class="pendiente">— elige de 1 a 4</span></div>
    <div class="rejilla secadores" id="asig-secadores"></div>

    <!-- Tunelero, supervisores y gerente. Van en su propia seccion y
         DEBAJO porque el caso comun es elegir un secador; estos entran
         cuando hay tanto trabajo que ellos tambien se ponen a secar.
         El titulo se esconde solo si no hay nadie. -->
    <div class="seccion" id="asig-otros-titulo" style="display:none">También pueden secar</div>
    <div class="rejilla secadores" id="asig-otros"></div>
  </div>
</div>

<div id="barra" style="display:none">
  <button id="confirmar" disabled>Empezar a secar</button>
  <button id="cancelar">Cancelar</button>
</div>

<!-- Confirmar la entrega. Se abre al tocar "Entregado": el secador avisa
     que ya quedo, pero el supervisor revisa antes de soltar el carro. -->
<div id="entrega">
  <div class="quien" id="ent-quien"></div>
  <div class="cual" id="ent-cual"></div>
  <!-- Se dice QUIEN seco a proposito: el supervisor esta a punto de
       registrarle un rechazo a una persona con nombre y debe ver a quien
       antes de tocar. -->
  <div class="cual" id="ent-secadores"></div>

  <div id="ent-decidir">
    <div class="rejilla entrega2">
      <button class="opcion bueno" data-entregar="1">Entregar</button>
      <button class="opcion malo" data-rechazar="1">Rechazar</button>
    </div>
  </div>

  <div id="ent-motivos" style="display:none">
    <div class="seccion">¿Qué le faltó?</div>
    <div class="rejilla motivos" id="ent-lista-motivos"></div>
  </div>

  <button id="ent-cerrar" class="opcion volver">Cancelar</button>
</div>

<!-- Los entregados de hoy, por si se entrego uno por equivocacion. -->
<div id="entregados">
  <!-- La cabecera va FIJA arriba. En un dia de 100 carros, el supervisor
       baja al numero 80 a buscar uno; si el boton de volver estuviera al
       final (o incluso solo arriba) tendria que recorrer toda la lista de
       regreso. Fijo, es un toque desde donde sea. -->
  <div id="entregados-cabecera">
    <div class="fila-cabecera">
      <button id="entregados-cerrar">&#8592;&nbsp; Volver a la cola</button>
      <!-- Un <select> nativo, no un menu propio: el CLAUDE.md prohibe
           menus y gestos, pero el selector del telefono es UN toque y
           lo abre el sistema con letra grande. Escribir un desplegable
           a mano seria mas menu, no menos. -->
      <select id="entregados-dia" title="Ver otro día"></select>
    </div>
    <div class="quien">Finalizados</div>
    <div class="cual" id="entregados-cuantos"></div>
  </div>
  <div id="entregados-lista"></div>
</div>

<!-- Desglose de un carro. Se abre al tocar su tarjeta en Finalizados. -->
<div id="detalle">
  <div id="detalle-cabecera">
    <button id="detalle-cerrar">&#8592;&nbsp; Volver</button>
  </div>
  <div id="detalle-cuerpo"></div>
</div>

<!-- capture="environment" abre la camara TRASERA directo, no la galeria.
     Lo pide el CLAUDE.md: el supervisor no debe navegar por archivos.
     El boton de galeria se quito el 20/jul/2026: no se usaba. -->
<input id="camara" type="file" accept="image/*" capture="environment">

<div id="acceso">
  <img id="logo-acceso" src="RUSH-Logo.png" alt="RUSH" onerror="this.style.display='none'">
  <h2>Código de acceso</h2>
  <p>Escribe el código que te dieron. Solo se pide esta vez: el teléfono lo recuerda.</p>
  <input id="campo" type="text" autocomplete="off" autocapitalize="characters" placeholder="RUSH-----">
  <div id="malcodigo">Ese código no es correcto</div>
  <button id="entrar">Entrar</button>
</div>

<script>
// De donde salen los datos. No es un secreto: la llave de la base vive
// en la Edge Function y nunca llega al telefono.
var API = "https://rwoyfvddhlabmmuvkpjx.supabase.co/functions/v1/app";

// Colores por estado. Vienen del CLAUDE.md: el supervisor reconoce el
// estado por color, sin tener que leer.
var COLORES = {
  prelavado:   "#2f81f7",  // azul
  tunel:       "#e3b341",  // amarillo
  por_asignar: "#a371f7",  // morado
  secando:     "#3fb950",  // verde
  entregado:   "#6e7681"
};

var TEXTOS = {
  // "Prelavado + Túnel" porque desde el flujo de un solo toque este
  // estado cubre las dos cosas: nadie marca cuando sale del túnel, así
  // que el carro sigue aquí hasta que se le asigna secador. El nombre
  // viejo hacía creer que el túnel era otra etapa que alguien marcaba.
  prelavado:   "Prelavado + Túnel",
  tunel:       "En túnel",
  por_asignar: "Falta asignar",
  secando:     "Secando",
  entregado:   "Entregado"
};

// El boton dice QUE ACCION HACE, no el estado ni algo generico como
// "siguiente". Regla del CLAUDE.md: el supervisor lee el boton y sabe
// exactamente que va a pasar al tocarlo.
// Desde el 19/jul/2026 el supervisor NO marca prelavado ni túnel: no le
// da tiempo, está asignando. Un solo toque antes de secar. Las etapas se
// reconstruyen solas en la base (el túnel dura 4 min, está medido).
//
// tunel y por_asignar siguen aquí solo por los carros que venían en
// camino cuando cambió el flujo.
var ACCIONES = {
  prelavado:   "Asignar unidad",
  tunel:       "Asignar unidad",
  por_asignar: "Asignar unidad",
  secando:     "Entregado"
};

// Los colores más vistos en la operación real. Un solo botón por color:
// BLANCA y BLANCO son el mismo color y contarlos aparte ensucia el
// reporte y el historial por placa.
var COLORES_COMUNES = ["BLANCO", "GRIS", "NEGRO", "ROJO", "AZUL", "VERDE"];

var TIPOS = {
  pickup:    "PICKUP",
  camioneta: "CAMIONETA",
  automovil: "AUTO",
  pasajeros: "PASAJEROS"
};

var carros = [];

// Firma de lo ultimo que se DIBUJO. Sirve para no reconstruir el HTML de
// la lista cuando nada estructural cambio: rehacerlo cada segundo (solo
// para mover el reloj) recreaba los botones y reiniciaba la animacion de
// los guiones, que se veia como un tironcito. Ver pintar() y
// actualizarRelojes().
var firmaRender = null;

// --- El boton "atras" del telefono cierra la pantalla, no sale de la app -
// En una app de pantalla completa el back del telefono sale de la app. Aqui
// se atrapa: cada pantalla que se abre encima (Asignar, Entrega,
// Finalizados, Detalle) empuja un estado al historial; el back —o el boton
// de Volver/Cancelar— consume uno y corre el cierre de esa pantalla, en vez
// de salir. Al no quedar ninguna, el back ya si sale normal.
//
// La regla para no desincronizar: TODO cierre (boton o back) pasa por
// cerrarPantalla() -> history.back() -> popstate, que es el unico que
// ejecuta el cierre real. Abrir empuja uno; cerrar consume uno.
var cerradores = [];

function registrarPantalla(cerrar) {
  cerradores.push(cerrar);
  // pushState puede fallar en file:// (preview); en https (la app real)
  // funciona. Si falla, la app sigue igual, solo sin atrapar el back.
  try { history.pushState({ rush: cerradores.length }, ""); } catch (e) {}
}

function cerrarPantalla() {
  if (cerradores.length) history.back();
}

window.addEventListener("popstate", function () {
  if (cerradores.length) {
    var cerrar = cerradores.pop();
    cerrar();
  }
});

// --- Codigo de acceso ------------------------------------------------
// El repositorio es publico, asi que la URL de la API se puede
// encontrar. El codigo evita que un desconocido vea la cola o mueva
// carros. Se teclea una vez por telefono y ahi se queda.
//
// Tambien se acepta en la direccion (...?c=CODIGO) para poder mandar un
// enlace listo por WhatsApp y que el supervisor no teclee nada.
var CODIGO = "";

function cargarCodigo() {
  var enLiga = new URLSearchParams(location.search).get("c");
  if (enLiga) {
    CODIGO = enLiga.trim().toUpperCase();
    try { localStorage.setItem("rush_codigo", CODIGO); } catch (e) {}
    // Se limpia de la barra de direcciones para que no ande a la vista.
    history.replaceState({}, "", location.pathname);
    return;
  }
  try { CODIGO = localStorage.getItem("rush_codigo") || ""; } catch (e) { CODIGO = ""; }
}

function pedirCodigo(fallo) {
  document.getElementById("acceso").style.display = "flex";
  document.getElementById("malcodigo").style.display = fallo ? "block" : "none";
  document.getElementById("campo").focus();
}

document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("entrar").addEventListener("click", function () {
    var v = document.getElementById("campo").value.trim().toUpperCase();
    if (!v) return;
    CODIGO = v;
    try { localStorage.setItem("rush_codigo", CODIGO); } catch (e) {}
    document.getElementById("acceso").style.display = "none";
    consultar();
  });
  document.getElementById("campo").addEventListener("keydown", function (ev) {
    if (ev.key === "Enter") document.getElementById("entrar").click();
  });
});

function escapar(t) {
  return String(t).replace(/[&<>"']/g, function (c) {
    return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c];
  });
}

// Iniciales para el circulo de un secador ponchado que ya no viene en
// Jibble: se arman del nombre, para que igual se reconozca.
function iniciales(nombre) {
  var p = String(nombre || "").trim().split(/\s+/);
  var a = (p[0] || "")[0] || "";
  var b = (p[1] || "")[0] || "";
  return (a + b).toUpperCase() || "?";
}

function reloj(segundos) {
  if (segundos < 0) segundos = 0;
  var m = Math.floor(segundos / 60);
  var s = segundos % 60;
  if (m < 60) return m + ":" + (s < 10 ? "0" : "") + s;
  var h = Math.floor(m / 60);
  m = m % 60;
  return h + ":" + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
}

function describir(c) {
  // Lo primero que ve el supervisor debe ser como reconocer el carro a
  // simple vista. El orden es el que usaria alguien senalando al carro:
  // que tipo es, de que color, y de que marca.
  //
  // La marca aparece hasta que el supervisor la captura al asignar; la
  // cajera solo pone tipo y color en la nota.
  var partes = [];
  if (c.tipo_unidad) partes.push(TIPOS[c.tipo_unidad] || c.tipo_unidad.toUpperCase());
  if (c.color) partes.push(c.color);
  if (c.marca) partes.push(c.marca);

  // La placa NO va aqui: tiene su propio renglon debajo (ver .placa).
  // Si no hay ni tipo ni color ni marca pero si placa, el "Sin datos" no
  // aparece — con la placa ya hay como reconocer el carro.
  if (partes.length === 0) {
    return c.placa ? "" : '<span class="falta">Sin datos del carro</span>';
  }
  return escapar(partes.join(" "));
}

function pintar() {
  // Si nada de lo que afecta el DIBUJO cambio, no se reconstruye el HTML:
  // hacerlo cada segundo (solo por el reloj) recreaba los botones y
  // reiniciaba la animacion de los guiones. Los relojes y el rojo de
  // demora los mueve actualizarRelojes(), que no toca los botones.
  // El reloj y "demorado" NO entran en la firma: son por tiempo, no por
  // datos, y se actualizan aparte.
  var firma = JSON.stringify(carros.map(function (c) {
    return [c.id, c.estado, c.linea, c.es_express, c.producto, c.variante,
            c.aviso, c.a_mano, c.tipo_unidad, c.color, c.marca, c.placa,
            c.foto, (c.ausentes || []).join(","), (c.secadores || []).join(",")];
  }));
  if (firma === firmaRender && document.querySelector("#lista .carro")) {
    return;
  }
  firmaRender = firma;

  var ahora = Date.now();
  var html = "";

  for (var i = 0; i < carros.length; i++) {
    var c = carros[i];
    var seg = Math.floor((ahora - new Date(c.etapa_inicio).getTime()) / 1000);
    // limite -1 = rojo siempre (falta asignar), 0 = nunca (tunel).
    var demorado = c.limite === -1 || (c.limite > 0 && seg > c.limite);
    var servicio = (c.producto || "") + (c.variante && c.variante !== c.producto ? " · " + c.variante : "");

    // data-id: para que actualizarRelojes() encuentre el carro de cada
    // tarjeta sin reconstruirla.
    html += '<div class="carro' + (demorado ? " demorado" : "") + (c.es_express ? " expreso" : "") +
            marcoDelCarro(c) +
            '" data-id="' + c.id +
            '" style="--color:' + (COLORES[c.estado] || "#6e7681") + '">';
    html +=   '<div class="unidad">' + describir(c) + '</div>';
    // La placa, en su renglon, entre el tipo de carro y el servicio. Solo
    // aparece si se pudo leer: si no, no se pinta nada (ni hueco, ni un
    // "sin placa" que no le sirve de nada al supervisor).
    if (c.placa) html += '<div class="placa">' + escapar(c.placa) + '</div>';
    html +=   '<div class="reloj">' + reloj(seg) + '</div>';
    // Los secadores van DENTRO del bloque del servicio, del mismo tamaño,
    // para que el dueño los vea sin abrir el carro. Solo si ya hay: antes
    // de asignar la lista viene vacia y no se pinta nada.
    var secTarjeta = (c.secadores && c.secadores.length)
      ? '<div class="secadores-tarjeta">' + escapar(c.secadores.join(", ")) + '</div>'
      : "";
    html +=   '<div class="servicio">' + escapar(servicio) + secTarjeta + '</div>';
    // Foto: si ya hay, se ve la miniatura; si no, el icono de camara.
    // Nunca estorba ni bloquea: el carro puede salir sin foto.
    //
    // Se habilita SOLO cuando el carro ya tiene carril y secador. Antes de
    // eso el carro puede no estar identificable todavia, y ahi es cuando se
    // le pegaba la foto al carro equivocado (paso el 19/jul). Deshabilitado
    // -> se ve apagado, no desaparece.
    var asignado = !!(c.linea && c.secadores && c.secadores.length);
    html +=   '<div class="fotos">';
    // Boton de info (la i en un circulo), donde antes estaba la galeria.
    // Abre el desglose de tiempos del carro. Es un boton y no un toque a la
    // tarjeta a proposito, para no abrirlo por accidente.
    html +=     '<button class="info" data-info="' + c.id + '" title="Ver tiempos del carro">' +
                  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
                  'stroke-linecap="round" stroke-linejoin="round">' +
                  '<circle cx="12" cy="12" r="9"></circle>' +
                  '<line x1="12" y1="11" x2="12" y2="16"></line>' +
                  '<circle cx="12" cy="7.6" r="1.05" fill="currentColor" stroke="none"></circle>' +
                  '</svg></button>';
    // La camara. El de galeria se quito el 20/jul/2026 — no se usaba.
    html +=     '<button class="foto" data-foto="' + c.id + '"' +
                  (asignado ? ' title="Tomar foto del carro"'
                            : ' disabled title="Primero asigna carril y secador"') + '>' +
                  (c.foto ? '<img src="' + escapar(c.foto) + '" alt="">' : '&#128247;') +
                '</button>';
    html +=   '</div>';

    html +=   '<div class="estado">';
    // Un lavado a mano NO entra al tunel, asi que su etiqueta no lo
    // menciona: dice solo "Prelavado" y la banderita cian se encarga de
    // avisar lo demas. Prometerle un tunel a un carro que se lava a mano
    // es de las cosas que hacen que el supervisor deje de creerle a la
    // pantalla.
    var textoEstado = TEXTOS[c.estado] || c.estado;
    if (c.a_mano && c.estado === "prelavado") textoEstado = "Prelavado";
    html +=     '<span class="etiqueta">' + escapar(textoEstado) + '</span>';
    // Mientras no tenga linea, la etiqueta recuerda a donde va. Ya
    // asignado seria repetir lo que dice la etiqueta de al lado.
    if (c.es_express) {
      html += '<span class="express">&#9873; EXPRESS' + (c.linea ? "" : " &rarr; LÍNEA 1") + '</span>';
    }
    // Va DESPUES del express y en su propio color: si el carro es las dos
    // cosas, se ven las dos. El texto sale de la base (columna generada),
    // asi que un producto nuevo en "Paquetes Especial" se anuncia solo.
    // Dos banderitas independientes: QUE trabajo es, y COMO se lava. Un
    // Super Brillo lavado a mano lleva las dos, y las dos importan.
    if (c.aviso) {
      html += '<span class="aviso-servicio ' + claseDeAviso(c.aviso) + '">&#9888; ' +
              escapar(c.aviso) + '</span>';
    }
    if (c.a_mano) {
      html += '<span class="aviso-servicio mano">&#9888; LAVADO A MANO</span>';
    }
    if (c.linea)      html += '<span class="linea">Línea ' + escapar(c.linea) + '</span>';
    html +=   '</div>';

    // Se poncho quien lo estaba secando. No se reasigna solo: el
    // supervisor decide, porque puede ser que otro ya lo haya tomado.
    if (c.ausentes && c.ausentes.length) {
      html += '<div class="ausente">&#9888; Se poncho ' + escapar(c.ausentes.join(", ")) +
              '<br>Reasigna este carro</div>';
    }

    html +=   '<div class="acciones">';
    // Los rayos rojos giran solo cuando el boton dice "Asignar unidad"
    // (todo lo que no es secando). En "Entregado" no: ahi es verde y no
    // se confunde.
    html +=     '<button class="avanzar' + (c.estado !== "secando" ? " girando" : "") +
                  '" data-accion="avanzar" data-carro="' + c.id + '">' +
                  escapar(ACCIONES[c.estado] || "Siguiente") + '</button>';
    // Corregir abre la pantalla de captura (tipo, color, marca). Sirve
    // siempre, incluso antes de asignar: es donde el supervisor arregla
    // lo que la cajera no puso.
    html +=     '<button class="corregir" data-editar="' + c.id + '">Corregir</button>';
    // Regresar deshace el paso anterior. En prelavado no hay a donde.
    html +=     '<button class="corregir" data-accion="corregir" data-carro="' + c.id +
                  '"' + (c.estado === "prelavado" ? " disabled" : "") + '>Regresar</button>';
    html +=   '</div>';
    html += '</div>';
  }

  document.getElementById("lista").innerHTML = html;
  document.getElementById("vacio").style.display = carros.length ? "none" : "block";
  document.getElementById("cuantos").textContent = carros.length ? carros.length + " en proceso" : "";
}

// Cada segundo, SOLO mueve el reloj y el rojo de demora de cada tarjeta,
// sin reconstruir el HTML. Asi la animacion de los guiones del boton
// corre fluida en vez de reiniciarse cada segundo. La tarjeta se ubica
// por su data-id.
function actualizarRelojes() {
  var ahora = Date.now();
  var tarjetas = document.querySelectorAll("#lista .carro");
  for (var i = 0; i < tarjetas.length; i++) {
    var el = tarjetas[i];
    var id = Number(el.getAttribute("data-id"));
    var c = null;
    for (var j = 0; j < carros.length; j++) {
      if (carros[j].id === id) { c = carros[j]; break; }
    }
    if (!c) continue;

    var seg = Math.floor((ahora - new Date(c.etapa_inicio).getTime()) / 1000);
    var demorado = c.limite === -1 || (c.limite > 0 && seg > c.limite);
    var rel = el.querySelector(".reloj");
    if (rel) rel.textContent = reloj(seg);
    // El rojo de demora se maneja con la clase en la tarjeta: togglearla
    // NO recrea el boton, asi que los guiones siguen corriendo.
    el.classList.toggle("demorado", demorado);
  }
}

function avisarError(hay) {
  // Solo se avisa si de plano no hay datos. Un parpadeo del wifi no debe
  // llenar la pantalla de alarmas: la siguiente consulta lo arregla sola.
  var e = document.getElementById("error");
  e.style.display = (hay && carros.length === 0) ? "block" : "none";
  e.textContent = "Sin conexion. Reintentando...";
}

function pedir(ruta, opciones) {
  opciones = opciones || {};
  opciones.headers = opciones.headers || {};
  opciones.headers["x-codigo"] = CODIGO;
  opciones.cache = "no-store";
  return fetch(API + ruta, opciones);
}

// --- Aviso cuando entra un carro -------------------------------------
// El CLAUDE.md lo pide asi: el supervisor no siempre ve la pantalla, y
// un carro que entra sin que nadie se entere es justo el problema que
// esta app existe para resolver.

var conocidos = null;   // null = primera carga, no se avisa de nada
var audio = null;

// El sonido se genera aqui mismo en vez de traer un archivo: funciona
// aunque no haya wifi y no hay nada que descargar.
function despertarAudio() {
  if (audio) return;
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audio = new AC();
  } catch (e) {}
}

function sonar() {
  if (!audio) return;
  try {
    if (audio.state === "suspended") audio.resume();
    // Dos notas cortas ascendentes: se oyen sobre el ruido del taller
    // sin ser una alarma molesta.
    [[880, 0], [1320, 0.16]].forEach(function (par) {
      var osc = audio.createOscillator();
      var vol = audio.createGain();
      osc.type = "square";
      osc.frequency.value = par[0];
      osc.connect(vol);
      vol.connect(audio.destination);
      var t = audio.currentTime + par[1];
      vol.gain.setValueAtTime(0.0001, t);
      vol.gain.exponentialRampToValueAtTime(0.35, t + 0.02);
      vol.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
      osc.start(t);
      osc.stop(t + 0.15);
    });
  } catch (e) {}
}

function avisarCarrosNuevos(nuevos) {
  var ids = nuevos.map(function (c) { return c.id; });

  if (conocidos === null) { conocidos = ids; return; }   // primera carga

  var entraron = ids.filter(function (id) { return conocidos.indexOf(id) < 0; });
  conocidos = ids;

  if (entraron.length > 0) {
    sonar();
    // Patron largo-corto-largo: se siente distinto a una notificacion
    // cualquiera del telefono.
    if (navigator.vibrate) navigator.vibrate([250, 120, 250]);
  }
}

// La pantalla no se debe apagar sola mientras el supervisor trabaja.
var candado = null;
function mantenerPantallaEncendida() {
  if (!navigator.wakeLock) return;
  navigator.wakeLock.request("screen")
    .then(function (c) { candado = c; })
    .catch(function () {});
}
document.addEventListener("visibilitychange", function () {
  // Android suelta el candado al minimizar; se vuelve a pedir al volver.
  if (document.visibilityState === "visible" && !candado) mantenerPantallaEncendida();
});

function consultar() {
  if (!CODIGO) { pedirCodigo(false); return; }

  pedir("/cola")
    .then(function (r) {
      if (r.status === 401) {
        // Codigo malo: se olvida para que no siga fallando en silencio.
        try { localStorage.removeItem("rush_codigo"); } catch (e) {}
        CODIGO = "";
        pedirCodigo(true);
        return null;
      }
      return r.json();
    })
    .then(function (d) {
      if (!d) return;
      carros = d.carros || [];
      avisarCarrosNuevos(carros);
      avisarError(false);
      pintar();
    })
    .catch(function () { avisarError(true); });
}

// --- Asignar linea, marca y secadores --------------------------------

// Las 8 de siempre, como botones grandes a la mano. Cubren la mayoria
// de los carros que entran.
var MARCAS_RAPIDAS = [
  "TOYOTA", "HONDA", "VOLKSWAGEN", "NISSAN",
  "CHEVROLET", "KIA", "MAZDA", "FORD"
];

// El resto, detras de "Otra". Mexicali es frontera, asi que hay mas
// marcas americanas de las que se verian en el centro del pais, y las
// chinas que crecieron fuerte estos anos.
var MARCAS_EXTRA = [
  "HYUNDAI", "JEEP", "RAM", "DODGE", "GMC", "CHRYSLER",
  "BUICK", "CADILLAC", "LINCOLN", "TESLA",
  "SUZUKI", "MITSUBISHI", "SUBARU", "ACURA", "LEXUS", "INFINITI",
  "RENAULT", "PEUGEOT", "FIAT", "SEAT", "CUPRA", "VOLVO",
  "BMW", "MERCEDES", "AUDI", "MINI", "PORSCHE", "LAND ROVER",
  "MG", "CHIREY", "BYD", "JETOUR", "OMODA", "GWM", "CHANGAN", "JAC",
  "BAIC", "GEELY", "ISUZU", "OTRA"
];

// De que color va la banderita de servicio especial.
//
// Solo se nombran las DOS excepciones; todo lo demas cae en morado. Eso
// importa: cuando el dueno de de alta un producto nuevo en "Paquetes
// Especial", se va a anunciar solo y en morado, sin tocar codigo. Si
// aqui se listaran todos, un producto nuevo saldria sin color.
//
// El texto viene de la base (columna generada carros.aviso); esto es
// solo presentacion, por eso vive aqui y no en SQL.
var COLOR_AVISO = {
  "DETALLADO": "detallado"
};
function claseDeAviso(aviso) {
  return COLOR_AVISO[aviso] || "encerado";
}

// De que color va el marco cuando el carro lleva varias banderitas.
// Gana el servicio sobre el "a mano": el a mano ya se ve en su etiqueta,
// y el servicio es el que genera las quejas de cliente.
function marcoDelCarro(c) {
  if (c.aviso)  return " marco-" + claseDeAviso(c.aviso);
  if (c.a_mano) return " marco-mano";
  return "";
}

// Se llenan desde Jibble, que se sincroniza solo cada minuto.
var SECADORES = [];
var FUERA = 0;

// Como se lee cada rol debajo del nombre. Solo se muestra para los que
// NO son secadores: poner "secador" en la seccion de secadores seria
// repetir el titulo trece veces.
var ROLES = {
  tunelero:   "tunelero",
  supervisor: "supervisor",
  gerente:    "gerente"
};

function cargarSecadores() {
  return pedir("/secadores")
    .then(function (r) { return r.json(); })
    .then(function (d) {
      SECADORES = d.secadores || [];
      FUERA = d.fuera || 0;
    })
    .catch(function () { /* se conserva la lista anterior */ });
}

// Una sola pantalla con DOS modos. asig.modo dice cual:
//
//   "asignar"  -> lo abre el boton grande. Pide linea y secadores.
//   "corregir" -> lo abre el boton Corregir. Solo captura datos; nada
//                 es obligatorio, el supervisor entra a poner una cosa
//                 y se sale.
//
// Es la misma pantalla y no dos porque el supervisor ya la conoce: lo
// unico que cambia es cuanto pide.
var asig = null;
var verMasMarcas = false;
// Se abre el campo de "otro color" cuando el supervisor lo pide, o solo,
// si el color que ya trae el carro no es de los comunes.
var verColorManual = false;

function abrirPantalla(c, modo) {
  asig = {
    carro: c.id,
    modo: modo,
    estado: c.estado,
    express: !!c.es_express,
    tipo: c.tipo_unidad || null,
    color: c.color || null,
    marca: c.marca || null,
    linea: c.linea || null,
    // Se PRESELECCIONan los secadores que el carro ya tiene (ids), para que
    // en Corregir salgan marcados y se puedan editar libre, igual que el
    // tipo y el color. En Asignar viene vacio (el carro aun no tiene). Se
    // filtran nulos (asignaciones viejas sin id de empleado).
    secadores: (c.secador_ids || []).filter(Boolean),
    // id -> nombre de los secadores actuales, para resolver el nombre
    // aunque la persona haya checado salida (ya no este en Jibble).
    nombreActualPorId: {}
  };
  var idsPrev = c.secador_ids || [], nomsPrev = c.secadores || [];
  for (var kk = 0; kk < idsPrev.length; kk++) {
    if (idsPrev[kk]) asig.nombreActualPorId[idsPrev[kk]] = nomsPrev[kk] || "Secador";
  }
  verMasMarcas = false;
  verColorManual = false;

  // Los express solo pueden ir a la 1, asi que se elige sola: un toque
  // menos, y se elimina la posibilidad de equivocarse.
  if (asig.express) asig.linea = 1;

  var detalle = [c.producto];
  if (c.variante && c.variante !== c.producto) detalle.push(c.variante);
  if (c.es_express) detalle.push("va a la LÍNEA 1");
  // El aviso se repite aqui a proposito, aunque ya salga en la tarjeta:
  // esta es la pantalla donde se decide QUIEN lo seca, y es el momento
  // exacto en que conviene que el supervisor sepa que no es un lavado
  // normal. Repetirlo cuesta un renglon; no repetirlo cuesta una queja.
  if (c.aviso)  detalle.push("⚠ " + c.aviso);
  if (c.a_mano) detalle.push("⚠ LAVADO A MANO");

  document.getElementById("asig-quien").innerHTML = describir(c);
  document.getElementById("asig-cual").textContent = detalle.filter(Boolean).join("  ·  ");

  // Linea y secadores solo cuando se esta asignando. Al corregir un carro
  // que ya seca, la linea si se puede cambiar (los secadores no: para eso
  // esta Regresar y volver a asignar).
  document.getElementById("asig-solo-asignar").style.display =
    (modo === "asignar" || c.estado === "secando") ? "block" : "none";

  var pantalla = document.getElementById("asignar");
  pantalla.style.display = "block";
  document.getElementById("barra").style.display = "flex";
  // Hasta ARRIBA. #asignar es un contenedor fijo con su propio scroll:
  // conserva donde quedo la vez pasada (tipico: abajo, en secadores), y
  // el supervisor no ve que arriba hay cosas por llenar. window.scrollTo
  // mueve el body, no este contenedor — hay que reiniciarlo a mano.
  pantalla.scrollTop = 0;
  window.scrollTo(0, 0);
  pintarAsignacion();
  registrarPantalla(cerrarAsignacion);   // el back del telefono la cierra

  // Se refresca al abrir: entre que se cargo la pantalla y llego este
  // carro, alguien pudo haber checado, salido o entrado a descanso.
  // Tambien en Corregir de un carro secando, porque ahi los secadores ya
  // se editan y hay que tener la lista fresca.
  if (modo === "asignar" || (modo === "corregir" && c.estado === "secando")) {
    cargarSecadores().then(pintarAsignacion);
  }
}

function abrirAsignacion(c) { abrirPantalla(c, "asignar"); }

function cerrarAsignacion() {
  asig = null;
  document.getElementById("asignar").style.display = "none";
  document.getElementById("barra").style.display = "none";

  // Si se venia de los entregados, se regresa ahi y no a la cola: el
  // supervisor estaba revisando esa lista y perderla seria hacerlo
  // buscar el carro otra vez. Se recarga para que el dato ya salga
  // corregido.
  if (volverAEntregados) {
    volverAEntregados = false;
    // Sin registrar: el estado de Finalizados sigue en la pila desde que se
    // abrio (Corregir solo lo escondio, no lo saco).
    abrirEntregados(true);
  }
}

function botonOpcion(texto, elegida, atributos, clases) {
  return '<button class="opcion' + (elegida ? " elegida" : "") +
         (clases ? " " + clases : "") + '" ' +
         (atributos || "") + '>' + escapar(texto) + '</button>';
}

function pintarAsignacion() {
  if (!asig) return;

  // --- Tipo de unidad ---
  // Se toca dos veces para quitarlo: el supervisor puede haberle picado
  // por error y debe poder dejarlo vacio en vez de tener que inventar uno.
  var h = "";
  var tipos = ["automovil", "camioneta", "pickup", "pasajeros"];
  for (var t = 0; t < tipos.length; t++) {
    h += botonOpcion(TIPOS[tipos[t]], asig.tipo === tipos[t], 'data-tipo="' + tipos[t] + '"');
  }
  document.getElementById("asig-tipos").innerHTML = h;

  // --- Color ---
  h = "";
  for (var k = 0; k < COLORES_COMUNES.length; k++) {
    h += botonOpcion(COLORES_COMUNES[k], asig.color === COLORES_COMUNES[k],
                     'data-color="' + escapar(COLORES_COMUNES[k]) + '"');
  }
  // Boton para un color que no esta en los comunes. Si el color que ya
  // trae el carro no es de la lista (ej. GUINDA de la nota), el boton lo
  // muestra y queda activo — el supervisor ve lo que hay.
  var colorEsOtro = asig.color && COLORES_COMUNES.indexOf(asig.color) < 0;
  h += botonOpcion(colorEsOtro ? asig.color : "Otro…", colorEsOtro, 'data-color-otro="1"');
  document.getElementById("asig-colores").innerHTML = h;

  // El campo se muestra si el supervisor lo pidio o si el color ya es de
  // "otro". No se reescribe su valor mientras esta enfocado, para no
  // pelear con lo que se esta tecleando.
  var caja = document.getElementById("asig-color-otro");
  var campoColor = document.getElementById("asig-color-input");
  if (verColorManual || colorEsOtro) {
    caja.style.display = "block";
    if (document.activeElement !== campoColor) {
      campoColor.value = colorEsOtro ? asig.color : "";
    }
  } else {
    caja.style.display = "none";
  }

  // --- Marcas ---
  var lista = MARCAS_RAPIDAS.slice();
  if (verMasMarcas) lista = lista.concat(MARCAS_EXTRA);
  h = "";
  for (var i = 0; i < lista.length; i++) {
    h += botonOpcion(lista[i], asig.marca === lista[i], 'data-marca="' + escapar(lista[i]) + '"');
  }
  if (!verMasMarcas) h += botonOpcion("Otra marca...", false, 'data-mas="1"');
  document.getElementById("asig-marcas").innerHTML = h;

  // --- Lineas ---
  h = "";
  for (var n = 1; n <= 6; n++) {
    // La 1 es solo de express; las demas solo para los que no lo son.
    var permitida = asig.express ? (n === 1) : (n !== 1);
    h += botonOpcion(
      "Línea " + n,
      asig.linea === n,
      'data-linea="' + n + '"' + (permitida ? "" : " disabled"),
      n === 1 ? "solo-express" : ""
    );
  }
  document.getElementById("asig-lineas").innerHTML = h;

  // --- Secadores ---
  // Se pintan DOS rejillas con la misma funcion: arriba los secadores
  // (el caso comun) y abajo el tunelero, los supervisores y el gerente,
  // que tambien secan cuando hay carga. La division sale de "orden", que
  // ya viene calculado de la base — la pantalla no sabe de jerarquias.
  function pintarPersona(p) {
    var puesto = asig.secadores.indexOf(p.id) >= 0;
    // Al llegar a 4 se apagan los demas, en vez de avisar despues del
    // error. Mas vale que el boton no se deje tocar a que regane.
    var lleno = asig.secadores.length >= 4 && !puesto;
    var clases = "persona" + (p.estado === "descanso" ? " descansando" : "");

    // Al gerente no se le pone "agregado a mano": no es un parche de
    // turno, es de planta. Decirlo confundiria.
    var nota = p.fuera ? "ya no aparece"
             : p.estado === "descanso" ? "en descanso"
             : (p.manual && !p.permanente) ? "agregado a mano"
             : (p.rol && p.rol !== "secador") ? ROLES[p.rol]
             : "";

    var dentro = '<span class="circulo" style="background:' + escapar(p.color || "#6e7681") + '">' +
                   escapar(p.iniciales || "?") + '</span>' +
                 '<span><span class="quien2">' + escapar(p.mostrar) + '</span>' +
                   (nota ? '<span class="nota2">' + escapar(nota) + '</span>' : '') +
                 '</span>';

    return '<button class="opcion ' + clases + (puesto ? " elegida" : "") + '" ' +
           'data-secador="' + escapar(p.id) + '"' + (lleno ? " disabled" : "") + '>' +
           dentro + '</button>';
  }

  var deSecado = [], deApoyo = [];
  for (var s = 0; s < SECADORES.length; s++) {
    (SECADORES[s].orden ? deApoyo : deSecado).push(SECADORES[s]);
  }

  // En Corregir, un secador YA asignado que checo salida no viene en la
  // lista de Jibble. Se agrega como entrada gris para que se vea marcado y
  // el supervisor pueda quitarlo: si no, "ver lo que esta seleccionado"
  // fallaria justo cuando hay algo que corregir.
  if (asig.modo === "corregir") {
    var enGrid = {};
    for (var g = 0; g < SECADORES.length; g++) enGrid[SECADORES[g].id] = true;
    for (var w = 0; w < asig.secadores.length; w++) {
      var idw = asig.secadores[w];
      if (idw && !enGrid[idw]) {
        var nomw = asig.nombreActualPorId[idw] || "Secador";
        deSecado.push({
          id: idw, mostrar: nomw, iniciales: iniciales(nomw),
          color: "#6e7681", estado: "activo", rol: "secador", orden: 0, fuera: true
        });
        enGrid[idw] = true;
      }
    }
  }

  h = "";
  if (deSecado.length === 0 && deApoyo.length === 0) {
    // Si Jibble falla o nadie checo, no se deja al supervisor sin salida.
    h += '<div id="sin-secadores">Nadie aparece checado.<br>Usa "No aparece" para agregarlo a mano.</div>';
  }
  for (var a = 0; a < deSecado.length; a++) h += pintarPersona(deSecado[a]);
  // Respaldo obligatorio del CLAUDE.md: la app nunca se queda bloqueada
  // porque una integracion externa fallo.
  h += botonOpcion("+ No aparece", false, 'data-manual="1"');
  document.getElementById("asig-secadores").innerHTML = h;

  var otros = "";
  for (var b2 = 0; b2 < deApoyo.length; b2++) otros += pintarPersona(deApoyo[b2]);
  document.getElementById("asig-otros").innerHTML = otros;
  // El titulo solo estorba si abajo no hay nadie.
  document.getElementById("asig-otros-titulo").style.display = deApoyo.length ? "" : "none";

  // --- Que falta ---
  function marcar(id, listo, texto) {
    var e = document.getElementById(id);
    e.className = listo ? "listo" : "pendiente";
    e.textContent = texto;
  }
  marcar("asig-marca-estado", !!asig.marca, asig.marca ? "— " + asig.marca : "— falta");
  marcar("asig-linea-estado", !!asig.linea, asig.linea ? "— línea " + asig.linea : "— falta");
  // Resumen tipo el tablero de Jibble: cuantos hay de cada cosa. Da el
  // panorama sin tener que contar botones. Igual en Asignar y en Corregir:
  // en los dos se eligen secadores.
  var enDescanso = SECADORES.filter(function (x) { return x.estado === "descanso"; }).length;
  var disponibles = SECADORES.length - enDescanso;
  // "1 de 4" se leia como "llevas 1 de los 4 que necesitas". Nunca fue
  // un requisito: con UNO basta, y caben hasta 4.
  var resumen = asig.secadores.length
    ? "— " + asig.secadores.length + (asig.secadores.length === 1 ? " elegido" : " elegidos")
    : "— elige al menos 1  (" + disponibles + " activos" +
      (enDescanso ? ", " + enDescanso + " en descanso" : "") +
      (FUERA ? ", " + FUERA + " fuera" : "") + ")";
  marcar("asig-sec-estado", asig.secadores.length > 0, resumen);

  var btn = document.getElementById("confirmar");

  // Al corregir casi nada es obligatorio: el supervisor entra a poner una
  // cosa y se sale. La unica regla: un carro que ya seca no puede quedarse
  // sin ningun secador (se borrarian todas sus asignaciones).
  if (asig.modo === "corregir") {
    if (asig.estado === "secando" && asig.secadores.length === 0) {
      btn.disabled = true;
      btn.textContent = "Deja al menos un secador";
    } else {
      btn.disabled = false;
      btn.textContent = "Guardar";
    }
    return;
  }

  // Un boton gris sin explicacion se ve igual que un boton roto. Si no
  // se puede confirmar, el boton DICE que falta en vez de quedarse mudo.
  var faltan = [];
  if (!asig.marca) faltan.push("la marca");
  if (!asig.linea) faltan.push("la línea");
  if (asig.secadores.length === 0) faltan.push("un secador");

  btn.disabled = faltan.length > 0;
  btn.textContent = faltan.length === 0
    ? "Empezar a secar"
    : "Falta " + (faltan.length === 1 ? faltan[0]
                : faltan.slice(0, -1).join(", ") + " y " + faltan[faltan.length - 1]);
}

document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("asignar").addEventListener("click", function (ev) {
    var b = ev.target.closest("button");
    if (!b || !asig) return;

    if (b.dataset.mas) { verMasMarcas = true; }
    // Tipo y color se apagan al volver a tocarlos: si el supervisor le
    // pico por error debe poder dejarlo vacio, no quedarse obligado a
    // inventar un dato.
    else if (b.dataset.tipo) {
      asig.tipo = (asig.tipo === b.dataset.tipo) ? null : b.dataset.tipo;
    }
    else if (b.dataset.color) {
      asig.color = (asig.color === b.dataset.color) ? null : b.dataset.color;
      // Al elegir un color de la lista se cierra el campo de "otro": si
      // habia algo escrito ahi, el comun lo reemplaza.
      verColorManual = false;
    }
    else if (b.dataset.colorOtro) {
      verColorManual = !verColorManual;
      // Al cerrarlo se limpia el color que se habia escrito a mano; deja
      // el carro sin color en vez de conservar uno que ya no se ve.
      if (!verColorManual && asig.color && COLORES_COMUNES.indexOf(asig.color) < 0) {
        asig.color = null;
      }
      pintarAsignacion();
      if (verColorManual) {
        var campo = document.getElementById("asig-color-input");
        if (campo) campo.focus();
      }
      return;
    }
    else if (b.dataset.marca) { asig.marca = b.dataset.marca; }
    else if (b.dataset.linea) { asig.linea = Number(b.dataset.linea); }
    else if (b.dataset.manual) {
      var nom = prompt("¿Cómo se llama? (no aparece en Jibble)");
      if (!nom || nom.trim().length < 2) return;
      pedir("/secador-manual", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre: nom.trim() })
      })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d && d.ok === false) { alert(d.error || "No se pudo agregar"); return; }
          return cargarSecadores().then(function () {
            // Queda elegido de una vez: si el supervisor se tomo la
            // molestia de agregarlo, es porque lo va a usar ahora.
            if (d && d.id && asig && asig.secadores.length < 4) asig.secadores.push(d.id);
            pintarAsignacion();
          });
        })
        .catch(function () { alert("Sin conexión."); });
      return;
    }
    else if (b.dataset.secador) {
      var i = asig.secadores.indexOf(b.dataset.secador);
      if (i >= 0) {
        asig.secadores.splice(i, 1);       // quitarlo nunca pregunta
      } else if (asig.secadores.length < 4) {
        var quien = SECADORES.filter(function (x) { return x.id === b.dataset.secador; })[0];

        // Se PUEDE asignar a alguien en descanso: muchos regresan antes
        // de que se acabe su hora porque les conviene por la propina.
        // Pero se confirma, para que nunca sea por accidente.
        if (quien && quien.estado === "descanso") {
          var min = quien.desde
            ? Math.floor((Date.now() - new Date(quien.desde).getTime()) / 60000)
            : null;
          var aviso = quien.mostrar + " está en DESCANSO" +
                      (min !== null ? " desde hace " + min + " min" : "") +
                      ".\n\n¿Asignarlo de todos modos?";
          if (!confirm(aviso)) return;
        }
        asig.secadores.push(b.dataset.secador);
      }
    } else return;

    if (navigator.vibrate) navigator.vibrate(15);
    pintarAsignacion();
  });

  // Color escrito a mano: se sube a MAYUSCULAS en cada tecla. El CSS solo
  // lo pinta en mayusculas; sin esto, lo que se guarda irian minusculas y
  // el formato no quedaria uniforme con lo que llega de la nota de caja.
  document.getElementById("asig-color-input").addEventListener("input", function () {
    var pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    try { this.setSelectionRange(pos, pos); } catch (e) {}
    if (asig) asig.color = this.value.trim() || null;
  });

  document.getElementById("cancelar").addEventListener("click", function () { cerrarPantalla(); });

  document.getElementById("confirmar").addEventListener("click", function () {
    if (!asig || ocupado) return;
    ocupado = true;
    this.disabled = true;
    if (navigator.vibrate) navigator.vibrate(30);

    // La misma pantalla llama a dos rutas distintas segun el modo. Se
    // ramifica aqui y no se duplica la barra: #confirmar y #cancelar
    // tienen sus escuchas amarradas una sola vez.
    var ruta, cuerpo;
    if (asig.modo === "corregir") {
      ruta = "/editar";
      cuerpo = {
        carro: asig.carro,
        tipo_unidad: asig.tipo,
        color: asig.color,
        marca: asig.marca,
        // La linea solo se manda si el carro ya esta secando; antes de eso
        // la base la rechaza porque todavia no hay secadores asignados.
        linea: asig.estado === "secando" ? asig.linea : null
      };
      // Los secadores tambien solo si ya seca: ahi la pantalla los mostro
      // editables. editar_carro los reconcilia SIN tocar las etapas, asi que
      // el cronometro de secado no se reinicia (a diferencia de Regresar).
      if (asig.estado === "secando") {
        cuerpo.empleados = asig.secadores;
        cuerpo.secadores = asig.secadores.map(function (id) {
          var p = SECADORES.filter(function (x) { return x.id === id; })[0];
          return p ? p.mostrar : (asig.nombreActualPorId[id] || id);
        });
      }
    } else {
      ruta = "/asignar";
      // Se mandan las dos cosas: el id para medir eficiencia por persona,
      // y el nombre tal como se ve hoy, para que el historial siga
      // diciendo quien seco aunque esa persona salga de Jibble.
      cuerpo = {
        carro: asig.carro,
        linea: asig.linea,
        marca: asig.marca,
        tipo_unidad: asig.tipo,
        color: asig.color,
        empleados: asig.secadores,
        secadores: asig.secadores.map(function (id) {
          var p = SECADORES.filter(function (x) { return x.id === id; })[0];
          return p ? p.mostrar : id;
        })
      };
    }

    pedir(ruta, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cuerpo)
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.ok === false) { alert(d.error || "No se pudo"); pintarAsignacion(); return; }
        cerrarPantalla();
      })
      .catch(function () { alert("Sin conexión. Intenta otra vez."); })
      .then(function () { ocupado = false; consultar(); });
  });
});

// --- La foto del carro (opcional) ------------------------------------
// Nunca bloquea nada. En dia pesado el supervisor la ignora y el carro
// sale igual; el CLAUDE.md lo pide asi.

var carroDeLaFoto = null;

// El wifi del taller es flojo, asi que la foto se achica AQUI antes de
// subirla. Una foto de celular pesa 3-5 MB; asi queda en ~150 KB.
function achicar(archivo) {
  return new Promise(function (listo, falla) {
    var lector = new FileReader();
    lector.onerror = falla;
    lector.onload = function () {
      var img = new Image();
      img.onerror = falla;
      img.onload = function () {
        var max = 1280;
        var an = img.width, al = img.height;
        if (an > al && an > max) { al = Math.round(al * max / an); an = max; }
        else if (al > max)       { an = Math.round(an * max / al); al = max; }

        var lienzo = document.createElement("canvas");
        lienzo.width = an; lienzo.height = al;
        lienzo.getContext("2d").drawImage(img, 0, 0, an, al);
        listo(lienzo.toDataURL("image/jpeg", 0.6));
      };
      img.src = lector.result;
    };
    lector.readAsDataURL(archivo);
  });
}

// --- Confirmar la entrega --------------------------------------------
// Tocar "Entregado" ya no entrega: abre esta pantalla. Sale del uso real
// — el secador avisa que ya quedo, pero el supervisor revisa antes de
// soltar el carro, y si algo falto queda registrado a nombre de quien lo
// seco. El objetivo no es castigar: es saber a quien entrenar y en que.
var entrega = null;      // el carro que se esta por entregar

// Respaldo. La lista buena vive en la base (motivos_de_rechazo), pero el
// supervisor NUNCA debe quedarse en una pantalla de rechazo sin botones:
// eso es un callejon sin salida en medio del turno.
var MOTIVOS_RESPALDO = [
  "Tablero", "Vidrios", "Rines", "Interior",
  "Marcos de puertas", "Cajuela", "Carroceria mojada", "Otro"
];

function cargarMotivos() {
  if (MOTIVOS.length) return Promise.resolve();
  return pedir("/motivos")
    .then(function (r) { return r.json(); })
    .then(function (d) { MOTIVOS = (d && d.motivos && d.motivos.length) ? d.motivos : MOTIVOS_RESPALDO; })
    // Se cae al respaldo tanto si la red falla como si la respuesta viene
    // vacia o con error: lo que importa es que haya botones.
    .catch(function () { MOTIVOS = MOTIVOS_RESPALDO; });
}

// Por si se entrego uno por equivocacion. Restaurar reusa la misma ruta
// de deshacer que el boton "Regresar" de la cola.

// Se llena una sola vez con los dias que tienen datos. Viene de

function cargarDiasDisponibles() {
  var sel = document.getElementById("entregados-dia");
  if (sel.options.length) return Promise.resolve();   // ya se cargo

  return pedir("/reportes")
    .then(function (r) { return r.json(); })
    .then(function (d) {
      var hoy = d.hoy;
      var dias = (d.dias || []).map(function (x) { return x.fecha; });
      // Hoy siempre primero, aunque todavia no tenga fila congelada.

      dias.sort().reverse();

      var h = "";
      for (var i = 0; i < dias.length; i++) {
        var etiqueta = dias[i] === hoy ? "Hoy" : comoSeLee(dias[i]);
        h += '<option value="' + escapar(dias[i] === hoy ? "" : dias[i]) + '">' +

// "2026-07-19" -> "19 jul". Se arma a mano y no con Date para que no se
// recorra un dia por la zona horaria.
var MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function comoSeLee(fecha) {
  var p = String(fecha).split("-");
  if (p.length !== 3) return fecha;
  return Number(p[2]) + " " + (MESES[Number(p[1]) - 1] || p[1]);
}
